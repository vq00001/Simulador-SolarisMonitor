#cloud-config
autoinstall:
  version: 1

  source:  # on the Ubuntu Server ISO, install with the minimal source
    id: ubuntu-server-minimal

  identity:
    hostname: broker-vm
    username: brokeradmin
    # Generar contraseña con mkpasswd -m sha-512. 
    # La contraseña es "brokeradmin" y se puede cambiar después de la instalación.
    password: "$6$TNxrzr58RzVi1goJ$D9SlN7rxxDFmiKm0ERbKax2YCf8PJqoOVdrLt/.Mcsw4a1tQ0n1dYc08lD4C5RLhw2EsoHugP/KMqt49ZczXT0"

  refresh-installer:
    update: no

  locale: es_CL.UTF-8 
  timezone: America/Santiago

  keyboard:
    layout: latam

  ssh:
    install_server: true
    allow-pw: true
    allow-public-key: true

  apt:
    update: true

  packages:
    - python3-full
    - python3-pip
    - python3-venv
    - avahi-daemon
    - net-tools
    - git
    - mosquitto
    - mosquitto-clients

  late-commands:
    - curtin in-target -- sudo -u brokeradmin git clone \
      https://github.com/vq00001/Simulador-SolarisMonitor \
      /home/brokeradmin/Simulador-SolarisMonitor